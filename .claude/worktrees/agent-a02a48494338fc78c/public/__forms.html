<!DOCTYPE html>
<html><head><title>Netlify Forms</title></head><body>
<form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="quote" />
  <input name="bot-field" />
  <input type="text" name="name" /><input type="text" name="businessName" />
  <input type="email" name="email" /><input type="tel" name="phone" />
  <input type="text" name="state" /><input type="text" name="contractorType" />
  <input type="text" name="yearsInBusiness" /><input type="text" name="annualRevenue" />
  <textarea name="message"></textarea>
</form>
<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input name="bot-field" />
  <input type="text" name="name" /><input type="text" name="businessName" />
  <input type="email" name="email" /><input type="tel" name="phone" />
  <input type="text" name="state" /><input type="text" name="contractorType" />
  <input type="text" name="yearsInBusiness" /><input type="text" name="annualRevenue" />
  <textarea name="message"></textarea>
</form>
</body></html>
